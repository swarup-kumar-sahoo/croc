name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run smoke tests
        run: |
          python -c "
          from croc_ui import (
              App, Page, Theme,
              Container, Row, Column, H1, H2, P, Button, Card,
              Navbar, Badge, Alert, Table, Accordion, Tabs,
              Style, Input, Form, Divider, Progress, Spinner,
          )

          # Test page renders
          page = Page(title='CI Test', theme=Theme('default'))
          page.add(
              Navbar(brand='Test', links=[('Home', '/')]),
              Container(
                  H1('Hello'),
                  P('World'),
                  Row(
                      Card(P('Card 1'), title='One'),
                      Card(P('Card 2'), title='Two'),
                  ),
                  Alert('Test alert', variant='success'),
                  Badge('v1.0', variant='primary', pill=True),
                  Table(headers=['A','B'], rows=[['1','2'],['3','4']]),
                  Progress(value=60, variant='primary'),
                  Spinner(),
              )
          )
          html = page.render()
          assert '<!DOCTYPE html>' in html
          assert '<title>CI Test</title>' in html
          assert 'croc-navbar' in html
          assert 'croc-card' in html
          print('All tests passed ✅')
          "

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
